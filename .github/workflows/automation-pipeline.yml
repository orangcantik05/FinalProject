name: Automation Test Pipeline (API + Web)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  api-tests:
    name: "🔌 API Automation Test - DummyAPI"
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔑 Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 📦 Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🧪 Run API Tests
        run: ./gradlew test --tests "runners.RunApiTest" --continue
        env:
          HEADLESS: true

      - name: 📊 Generate Cucumber Report
        if: always()
        run: ./gradlew generateCucumberReport --continue || true

      - name: 📁 Upload API Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-reports
          path: |
            build/reports/cucumber/
            build/reports/tests/
          retention-days: 30

  web-tests:
    name: "🌐 Web Automation Test - Selenium"
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🌐 Setup Chrome Browser
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: 🔑 Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 📦 Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🧪 Run Web Tests (including E2E Checkout)
        run: ./gradlew test --tests "runners.RunWebTest" --continue
        env:
          HEADLESS: true
          DISPLAY: :99

      - name: 📊 Generate Cucumber Report
        if: always()
        run: ./gradlew generateCucumberReport --continue || true

      - name: 📁 Upload Web Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-test-reports
          path: |
            build/reports/cucumber/
            build/reports/tests/
          retention-days: 30

  full-test-suite:
    name: "🚀 Full Test Suite (API + Web + E2E)"
    runs-on: ubuntu-latest
    needs: [api-tests, web-tests]
    if: always()

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🌐 Setup Chrome Browser
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: 🔑 Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 📦 Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🧪 Run All Tests
        run: ./gradlew test --continue
        env:
          HEADLESS: true

      - name: 📊 Generate Full Cucumber Report
        if: always()
        run: ./gradlew generateCucumberReport --continue || true

      - name: 📁 Upload Full Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-test-reports-${{ github.run_number }}
          path: |
            build/reports/cucumber/
            build/reports/tests/
          retention-days: 30

      - name: ✅ Test Summary
        if: always()
        run: |
          echo "=========================================="
          echo "  FINAL PROJECT - AUTOMATION TEST SUMMARY"
          echo "=========================================="
          echo "✅ API Tests: DummyAPI.io"
          echo "   - GET List User"
          echo "   - GET User by ID"
          echo "   - POST Create User"
          echo "   - GET User with Pagination"
          echo "   - PUT Update User"
          echo "   - ❌ GET Invalid User ID (Negative)"
          echo "   - ❌ POST Without app-id (Negative)"
          echo "   - ❌ POST Create User Incomplete Body (Negative)"
          echo ""
          echo "🌐 Web Tests: The Internet Herokuapp"
          echo "   - Login berhasil (Positive)"
          echo "   - Login & Logout (Positive)"
          echo "   - ❌ Login password salah (Negative)"
          echo "   - ❌ Login username kosong (Negative)"
          echo "   - Checkbox interaction (Positive)"
          echo "   - Dropdown selection (Positive)"
          echo ""
          echo "🛒 E2E Test: SauceDemo Checkout"
          echo "   - Login → Add to Cart → Checkout → Order Confirmed"
          echo "=========================================="
